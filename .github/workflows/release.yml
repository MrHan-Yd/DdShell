name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          name: "DdShell-${{ github.ref_name }}"
          body: |
            ## DdShell ${{ github.ref_name }}

            v0.3.1 是一个重要的 Windows 修复版本，基于 `v0.3.0..HEAD` 的实际提交整理，解决 v0.3.0 的 MSI 安装包无法安装（错误代码 2503）以及 MSI 安装用户应用内更新静默失败的问题。

            Windows 应用内更新现在按安装类型自动区分流程：NSIS（.exe）安装的用户保持原有体验，更新静默完成后确认重启即可；MSI 安装的用户在更新下载完成后，会看到"打开安装程序"提示，点击后唤起标准安装向导，按引导完成安装（可自选安装目录），安装完成后重新启动 DdShell 即可使用新版本。

            **v0.3.0 MSI 用户请注意：** 由于 v0.3.0 的自动更新存在缺陷，无法通过应用内更新升级到本版本。请从下方直接下载 `DdShell-v0.3.1-windows-x64.msi`（或 `.exe`）手动安装一次，之后即可正常使用应用内更新。

            本次同时修复了设置中主题选择卡片边框被裁切的显示问题。

            开源跨平台 SSH/SFTP 桌面客户端。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS (Apple Silicon) | `DdShell-${{ github.ref_name }}-macos-aarch64.dmg` | M1/M2/M3/M4 芯片 |
            | macOS (Intel) | `DdShell-${{ github.ref_name }}-macos-x86_64.dmg` | Intel 芯片 |
            | Windows | `DdShell-${{ github.ref_name }}-windows-x64.msi` | 64位安装包 |
            | Windows | `DdShell-${{ github.ref_name }}-windows-x64.exe` | 64位 NSIS 安装包 |
            | Linux | `DdShell-${{ github.ref_name }}-linux-amd64.deb` | Debian/Ubuntu |
            | Linux | `DdShell-${{ github.ref_name }}-linux-amd64.AppImage` | 通用格式 |

            ### macOS 用户须知

            由于本应用为开源免费软件，未购买 Apple 开发者签名，首次打开可能会遇到以下提示：

            **提示"已损坏"：** 在终端执行以下命令后重新打开：
            ```bash
            xattr -cr /Applications/DdShell.app
            ```

            **提示"不安全"或"无法验证开发者"：** 打开「系统设置」→「隐私与安全性」，下滑找到提示"DdShell 已被阻止"，点击「仍要打开」

            > 以上操作只需执行一次，之后可正常使用。
          draft: false
          prerelease: false

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            suffix: macos-aarch64
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            suffix: macos-x86_64
          - platform: ubuntu-22.04
            rust_target: ""
            args: ""
            suffix: linux-amd64
          - platform: windows-latest
            rust_target: ""
            args: ""
            suffix: windows-x64

    runs-on: ${{ matrix.platform }}
    env:
      HAS_APPLE_SIGNING: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing secrets
        shell: bash
        run: |
          missing=0
          for name in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Tauri updater artifacts require signing secrets."
            exit 1
          fi

      - name: Validate macOS signing secrets
        if: startsWith(matrix.platform, 'macos') && env.HAS_APPLE_SIGNING == 'true'
        run: |
          missing=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "macOS release requires code signing and notarization secrets."
            exit 1
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri app
        if: matrix.platform != 'macos-latest'
        working-directory: app
        run: pnpm tauri build ${{ matrix.args }}

      - name: Build signed Tauri app (macOS)
        if: startsWith(matrix.platform, 'macos') && env.HAS_APPLE_SIGNING == 'true'
        working-directory: app
        run: pnpm tauri build ${{ matrix.args }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build unsigned Tauri app (macOS)
        if: startsWith(matrix.platform, 'macos') && env.HAS_APPLE_SIGNING != 'true'
        working-directory: app
        run: pnpm tauri build ${{ matrix.args }}

      - name: Verify macOS app signature
        if: startsWith(matrix.platform, 'macos') && env.HAS_APPLE_SIGNING == 'true'
        run: |
          APP_PATH=$(find app/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Built .app bundle not found"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type exec --verbose=2 "$APP_PATH"

      # ── Rename & Upload (macOS) ──
      - name: Rename macOS dmg
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd app/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg
          for f in *.dmg; do
            mv "$f" "DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.dmg"
          done

      - name: Upload macOS dmg
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          files: app/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.dmg
          tag_name: ${{ github.ref_name }}

      - name: Copy macOS updater artifacts
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd app/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos
          artifact=$(find . -maxdepth 1 -name "*.app.tar.gz" -print -quit)
          if [ -z "$artifact" ]; then
            echo "::error::macOS updater artifact not found"
            exit 1
          fi
          if [ ! -f "$artifact.sig" ]; then
            echo "::error::macOS updater signature not found: $artifact.sig"
            exit 1
          fi
          cp "$artifact" "/tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.app.tar.gz"
          cp "$artifact.sig" "/tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.app.tar.gz.sig"

      - name: Upload macOS updater artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.app.tar.gz
            /tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.app.tar.gz.sig
          tag_name: ${{ github.ref_name }}

      # ── Rename & Upload (Linux) ──
      - name: Rename and upload Linux packages
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd app/src-tauri/target/release/bundle
          # deb
          for f in deb/*.deb; do
            cp "$f" "/tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.deb"
          done
          # AppImage
          for f in appimage/*.AppImage; do
            cp "$f" "/tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.AppImage"
          done

      - name: Upload Linux deb
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.deb
          tag_name: ${{ github.ref_name }}

      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.AppImage
          tag_name: ${{ github.ref_name }}

      # ── Rename & Upload (Windows) ──
      - name: Rename and upload Windows packages
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $bundleDir = "app/src-tauri/target/release/bundle"
          $msi = Get-ChildItem "$bundleDir/msi/*.msi" | Select-Object -First 1
          if (-not $msi) {
            Write-Error "Windows MSI installer not found"
            exit 1
          }

          $exe = Get-ChildItem "$bundleDir/nsis/*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "Windows NSIS installer not found"
            exit 1
          }

          $updaterSig = "$($exe.FullName).sig"
          if (-not (Test-Path $updaterSig)) {
            Write-Error "Windows NSIS updater signature not found: $updaterSig"
            exit 1
          }

          $msiUpdaterSig = "$($msi.FullName).sig"
          if (-not (Test-Path $msiUpdaterSig)) {
            Write-Error "Windows MSI updater signature not found: $msiUpdaterSig"
            exit 1
          }

          Copy-Item $msi.FullName "$env:RUNNER_TEMP/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.msi"
          Copy-Item $exe.FullName "$env:RUNNER_TEMP/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.exe"
          Copy-Item $updaterSig "$env:RUNNER_TEMP/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.exe.sig"
          Copy-Item $msiUpdaterSig "$env:RUNNER_TEMP/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.msi.sig"

      - name: Upload Windows msi
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.msi
          tag_name: ${{ github.ref_name }}

      - name: Upload Windows exe
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.exe
          tag_name: ${{ github.ref_name }}

      - name: Upload Windows updater artifacts
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.exe.sig
            ${{ runner.temp }}/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.msi.sig
          tag_name: ${{ github.ref_name }}

  publish-updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
    steps:
      - name: Download updater signatures
        run: |
          mkdir -p updater-signatures
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir updater-signatures

      - name: Generate latest.json
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const tag = process.env.TAG;
          const repo = process.env.REPO;
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const readSig = (name) => fs.readFileSync(`updater-signatures/${name}.sig`, "utf8").trim();

          const manifest = {
            version: tag,
            notes: `DdShell ${tag}`,
            pub_date: new Date().toISOString(),
            platforms: {
              "darwin-aarch64": {
                signature: readSig(`DdShell-${tag}-macos-aarch64.app.tar.gz`),
                url: `${baseUrl}/DdShell-${tag}-macos-aarch64.app.tar.gz`
              },
              "darwin-x86_64": {
                signature: readSig(`DdShell-${tag}-macos-x86_64.app.tar.gz`),
                url: `${baseUrl}/DdShell-${tag}-macos-x86_64.app.tar.gz`
              },
              "windows-x86_64-nsis": {
                signature: readSig(`DdShell-${tag}-windows-x64.exe`),
                url: `${baseUrl}/DdShell-${tag}-windows-x64.exe`
              },
              "windows-x86_64-msi": {
                signature: readSig(`DdShell-${tag}-windows-x64.msi`),
                url: `${baseUrl}/DdShell-${tag}-windows-x64.msi`
              }
            }
          };

          const requiredPlatforms = [
            "darwin-aarch64",
            "darwin-x86_64",
            "windows-x86_64-nsis",
            "windows-x86_64-msi"
          ];

          for (const platform of requiredPlatforms) {
            if (!manifest.platforms[platform]) {
              throw new Error(`latest.json is missing required updater platform: ${platform}`);
            }
          }

          if (manifest.platforms["windows-x86_64"]) {
            throw new Error("Do not publish a broad windows-x86_64 fallback while MSI and NSIS are both shipped");
          }

          fs.writeFileSync("latest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Upload updater manifest
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.ref_name }}
