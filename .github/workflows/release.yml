name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          name: "DdShell-${{ github.ref_name }}"
          body: |
            ## DdShell ${{ github.ref_name }}

            开源跨平台 SSH/SFTP 桌面客户端。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS (Apple Silicon) | `DdShell-${{ github.ref_name }}-macos-aarch64.dmg` | M1/M2/M3/M4 芯片 |
            | macOS (Intel) | `DdShell-${{ github.ref_name }}-macos-x86_64.dmg` | Intel 芯片 |
            | Windows | `DdShell-${{ github.ref_name }}-windows-x64.msi` | 64位安装包 |
            | Windows | `DdShell-${{ github.ref_name }}-windows-x64.exe` | 64位免安装 |
            | Linux | `DdShell-${{ github.ref_name }}-linux-amd64.deb` | Debian/Ubuntu |
            | Linux | `DdShell-${{ github.ref_name }}-linux-amd64.AppImage` | 通用格式 |
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            suffix: macos-aarch64
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            suffix: macos-x86_64
          - platform: ubuntu-22.04
            rust_target: ""
            args: ""
            suffix: linux-amd64
          - platform: windows-latest
            rust_target: ""
            args: ""
            suffix: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: app
        run: pnpm tauri build ${{ matrix.args }}

      # ── Rename & Upload (macOS) ──
      - name: Rename macOS dmg
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd app/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg
          for f in *.dmg; do
            mv "$f" "DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.dmg"
          done

      - name: Upload macOS dmg
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          files: app/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.dmg
          tag_name: ${{ github.ref_name }}

      # ── Rename & Upload (Linux) ──
      - name: Rename and upload Linux packages
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd app/src-tauri/target/release/bundle
          # deb
          for f in deb/*.deb; do
            cp "$f" "/tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.deb"
          done
          # AppImage
          for f in appimage/*.AppImage; do
            cp "$f" "/tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.AppImage"
          done

      - name: Upload Linux deb
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.deb
          tag_name: ${{ github.ref_name }}

      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.AppImage
          tag_name: ${{ github.ref_name }}

      # ── Rename & Upload (Windows) ──
      - name: Rename and upload Windows packages
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $bundleDir = "app/src-tauri/target/release/bundle"
          # MSI
          $msi = Get-ChildItem "$bundleDir/msi/*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "$env:RUNNER_TEMP/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.msi"
          }
          # NSIS exe
          $exe = Get-ChildItem "$bundleDir/nsis/*.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "$env:RUNNER_TEMP/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.exe"
          }

      - name: Upload Windows msi
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.msi
          tag_name: ${{ github.ref_name }}

      - name: Upload Windows exe
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/DdShell-${{ github.ref_name }}-${{ matrix.suffix }}.exe
          tag_name: ${{ github.ref_name }}
