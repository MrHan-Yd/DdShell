<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 左D渐变 (青色) -->
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DE0F0"/>
      <stop offset="100%" stop-color="#1AABB8"/>
    </linearGradient>
    <!-- 右D渐变 (深蓝) -->
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D5A73"/>
      <stop offset="100%" stop-color="#1C2F40"/>
    </linearGradient>
    <!-- 信号波渐变 (青→深蓝) -->
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#24C8DB"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
    <!-- 青色光晕 -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feFlood flood-color="#24C8DB" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 深蓝光晕 -->
    <filter id="glowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feFlood flood-color="#2C3E50" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 发光描边 (青色) -->
    <filter id="edgeGlowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <!-- 发光描边 (深蓝) -->
    <filter id="edgeGlowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2E3E"/>
      <stop offset="100%" stop-color="#0F1D28"/>
    </linearGradient>
    <!-- 右D裁剪区域 -->
    <clipPath id="rightDClip">
      <path d="M102 20 L102 70 C102 78 114 86 114 100 C114 114 102 122 102 130 L102 180 C170 180 188 145 188 100 C188 55 170 20 102 20Z"/>
    </clipPath>
  </defs>

  <!-- macOS 风格圆角矩形背景 -->
  <rect x="16" y="16" width="168" height="168" rx="38" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="168" height="168" rx="38" fill="none" stroke="#2A4055" stroke-width="0.8" opacity="0.5"/>

  <g transform="translate(100 100) scale(0.75) translate(-100 -100)">
    <!-- 左D 发光描边 -->
    <path d="M98 20 L98 70 C98 78 86 86 86 100 C86 114 98 122 98 130 L98 180 C30 180 12 145 12 100 C12 55 30 20 98 20Z" fill="none" stroke="#24C8DB" stroke-width="3" filter="url(#edgeGlowCyan)" opacity="0.5"/>
    <!-- 右D 发光描边 -->
    <path d="M102 20 L102 70 C102 78 114 86 114 100 C114 114 102 122 102 130 L102 180 C170 180 188 145 188 100 C188 55 170 20 102 20Z" fill="none" stroke="#3D5A73" stroke-width="3" filter="url(#edgeGlowDark)" opacity="0.45"/>

    <!-- 左D (Client) -->
    <path d="M98 20 L98 70 C98 78 86 86 86 100 C86 114 98 122 98 130 L98 180 C30 180 12 145 12 100 C12 55 30 20 98 20Z" fill="url(#leftGrad)"/>

    <!-- 右D (Server) -->
    <path d="M102 20 L102 70 C102 78 114 86 114 100 C114 114 102 122 102 130 L102 180 C170 180 188 145 188 100 C188 55 170 20 102 20Z" fill="url(#rightGrad)"/>

    <!-- 右D 终端纹理线条 (长短不一 + 圆头) -->
    <g clip-path="url(#rightDClip)" opacity="0.12" stroke-linecap="round">
      <line x1="110" y1="55" x2="158" y2="55" stroke="white" stroke-width="1.5"/>
      <line x1="110" y1="75" x2="180" y2="75" stroke="white" stroke-width="1.5"/>
      <line x1="110" y1="95" x2="145" y2="95" stroke="white" stroke-width="1.5"/>
      <line x1="110" y1="115" x2="170" y2="115" stroke="white" stroke-width="1.5"/>
      <line x1="110" y1="135" x2="138" y2="135" stroke="white" stroke-width="1.5"/>
      <line x1="110" y1="155" x2="155" y2="155" stroke="white" stroke-width="1.5"/>
    </g>

    <!-- 终端光标 ▊ -->
    <rect x="140" y="130" width="6" height="11" fill="white" opacity="0.45" clip-path="url(#rightDClip)"/>

    <!-- 中间信号波 (渐变色) -->
    <path d="M90 92 Q100 88 110 92" stroke="url(#waveGrad)" stroke-width="1.2" fill="none" opacity="0.45"/>
    <path d="M88 100 Q100 95 112 100" stroke="url(#waveGrad)" stroke-width="1.5" fill="none" opacity="0.65"/>
    <path d="M90 108 Q100 112 110 108" stroke="url(#waveGrad)" stroke-width="1.2" fill="none" opacity="0.45"/>

    <!-- 左D圆点 + 光晕 -->
    <circle cx="48" cy="100" r="11" fill="#2C3E50" filter="url(#glowDark)"/>

    <!-- 右D圆点 + 光晕 -->
    <circle cx="152" cy="100" r="11" fill="#24C8DB" filter="url(#glowCyan)"/>
  </g>
</svg>
